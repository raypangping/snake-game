<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 Pro | Snake Game</title>
    <style>
        :root {
            /* 主色调 - 霓虹渐变 */
            --primary-1: #00ff88;
            --primary-2: #00cc6a;
            --primary-3: #00ffaa;
            --accent: #00ffff;

            /* 食物颜色 */
            --food-color: #ff6b6b;

            /* 深色主题 */
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-grid: rgba(255, 255, 255, 0.03);
            --text-primary: #ffffff;
            --text-secondary: #888899;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 0 40px rgba(0, 255, 136, 0.2);
            --glow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        [data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-grid: rgba(0, 0, 0, 0.05);
            --text-primary: #1a1a2e;
            --text-secondary: #6a6a7a;
            --border: rgba(0, 0, 0, 0.1);
            --shadow: 0 0 40px rgba(0, 204, 106, 0.3);
            --glow: 0 0 15px rgba(0, 204, 106, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* 动态背景 */
        .background {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -1;
        }

        .background-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }

        .background-blob:nth-child(1) {
            width: 400px;
            height: 400px;
            background: var(--primary-1);
            top: -100px;
            left: -100px;
        }

        .background-blob:nth-child(2) {
            width: 300px;
            height: 300px;
            background: var(--accent);
            bottom: -50px;
            right: -50px;
            animation-delay: -7s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* 游戏容器 */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
        }

        /* 头部 */
        .header {
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-1), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: var(--glow);
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-1), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 分数板 */
        .scoreboard {
            display: flex;
            gap: 2rem;
            justify-content: center;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .score-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-1), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 游戏画布 */
        .canvas-wrapper {
            position: relative;
            padding: 4px;
            background: linear-gradient(135deg, var(--primary-1), var(--accent));
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        #gameCanvas {
            display: block;
            background: var(--bg-secondary);
            border-radius: 12px;
        }

        /* 控制区域 */
        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-1), var(--primary-2));
            color: white;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 255, 136, 0.5);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-grid);
            border-color: var(--primary-1);
        }

        /* 难度选择 */
        .difficulty {
            display: flex;
            gap: 0.5rem;
            background: var(--bg-secondary);
            padding: 0.25rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .difficulty-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, var(--primary-1), var(--primary-2));
            color: white;
        }

        .difficulty-btn:hover:not(.active) {
            color: var(--text-primary);
        }

        /* 游戏结束覆盖层 */
        .game-over-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 10;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .game-over-text {
            font-size: 2rem;
            font-weight: 800;
            color: var(--food-color);
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .game-over-score {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .game-over-score span {
            color: var(--primary-1);
            font-weight: 700;
        }

        /* 主题切换 */
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-toggle svg {
            width: 22px;
            height: 22px;
            color: var(--text-primary);
        }

        .sun-icon { display: none; }
        [data-theme="light"] .moon-icon { display: none; }
        [data-theme="light"] .sun-icon { display: block; }

        /* 移动端控制 */
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mobile-btn:active {
            transform: scale(0.9);
        }

        .mobile-btn.up { grid-column: 2; }
        .mobile-btn.left { grid-column: 1; grid-row: 2; }
        .mobile-btn.down { grid-column: 2; grid-row: 2; }
        .mobile-btn.right { grid-column: 3; grid-row: 2; }

        @media (max-width: 640px) {
            .game-container {
                padding: 1rem;
            }

            .logo-text {
                font-size: 1.5rem;
            }

            .scoreboard {
                gap: 1rem;
            }

            .score-value {
                font-size: 1.5rem;
            }

            #gameCanvas {
                max-width: 100%;
            }

            .mobile-controls {
                display: grid;
            }

            .controls {
                width: 100%;
                justify-content: center;
            }

            .difficulty {
                width: 100%;
                justify-content: center;
            }
        }

        /* 暂停提示 */
        .pause-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .pause-overlay.show {
            display: flex;
        }

        .pause-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body data-theme="dark">
    <!-- 动态背景 -->
    <div class="background">
        <div class="background-blob"></div>
        <div class="background-blob"></div>
    </div>

    <!-- 主题切换 -->
    <button class="theme-toggle" id="themeToggle" title="切换主题">
        <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
    </button>

    <!-- 游戏容器 -->
    <div class="game-container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">🐍</div>
                <h1 class="logo-text">贪吃蛇 Pro</h1>
            </div>
            <div class="scoreboard">
                <div class="score-item">
                    <div class="score-label">当前分数</div>
                    <div class="score-value" id="currentScore">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="highScore">0</div>
                </div>
            </div>
        </header>

        <!-- 游戏画布 -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="400"></canvas>

            <!-- 游戏结束覆盖层 -->
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="game-over-text">GAME OVER</div>
                <div class="game-over-score">得分：<span id="finalScore">0</span></div>
                <button class="btn btn-primary" id="restartBtn">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    再来一局
                </button>
            </div>

            <!-- 暂停覆盖层 -->
            <div class="pause-overlay" id="pauseOverlay">
                <div class="pause-text">已暂停</div>
            </div>
        </div>

        <!-- 控制区域 -->
        <div class="controls">
            <div class="difficulty">
                <button class="difficulty-btn" data-speed="easy">简单</button>
                <button class="difficulty-btn active" data-speed="normal">中等</button>
                <button class="difficulty-btn" data-speed="hard">困难</button>
            </div>
            <button class="btn btn-primary" id="startPauseBtn">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                开始游戏
            </button>
            <button class="btn btn-secondary" id="resetBtn">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
                重置
            </button>
        </div>

        <!-- 移动端控制 -->
        <div class="mobile-controls">
            <button class="mobile-btn up" data-direction="up">↑</button>
            <button class="mobile-btn left" data-direction="left">←</button>
            <button class="mobile-btn down" data-direction="down">↓</button>
            <button class="mobile-btn right" data-direction="right">→</button>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const CONFIG = {
            gridSize: 20,           // 每个格子的大小（像素）
            gridWidth: 30,          // 横向格子数
            gridHeight: 20,         // 纵向格子数
            speeds: {
                easy: 200,          // 简单速度（毫秒/帧）
                normal: 120,        // 中等速度
                hard: 80            // 困难速度
            }
        };

        // ==================== 游戏状态 ====================
        let snake = [];              // 蛇身数组
        let food = {};               // 食物位置
        let direction = { x: 1, y: 0 };  // 当前方向
        let nextDirection = { x: 1, y: 0 }; // 下一步方向（防止掉头）
        let score = 0;               // 当前分数
        let highScore = 0;           // 最高分
        let gameSpeed = CONFIG.speeds.normal;  // 当前速度
        let gameRunning = false;     // 游戏是否运行中
        let gamePaused = false;      // 游戏是否暂停
        let gameLoopId = null;       // 游戏循环 ID

        // ==================== DOM 元素 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const currentScoreEl = document.getElementById('currentScore');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const startPauseBtn = document.getElementById('startPauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const resetBtn = document.getElementById('resetBtn');
        const themeToggle = document.getElementById('themeToggle');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');
        const mobileBtns = document.querySelectorAll('.mobile-btn');

        // ==================== 初始化 ====================
        /**
         * 初始化游戏
         */
        function init() {
            loadHighScore();
            loadTheme();
            initSnake();
            spawnFood();
            draw();
            bindEvents();
            updateScoreDisplay();
        }

        /**
         * 初始化蛇的位置（在中间）
         */
        function initSnake() {
            const startX = Math.floor(CONFIG.gridWidth / 2);
            const startY = Math.floor(CONFIG.gridHeight / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
        }

        // ==================== 游戏主循环 ====================
        /**
         * 游戏主循环
         */
        function gameLoop() {
            if (!gameRunning || gamePaused) return;

            update();
            draw();

            gameLoopId = setTimeout(gameLoop, gameSpeed);
        }

        /**
         * 更新游戏状态
         */
        function update() {
            // 更新方向
            direction = { ...nextDirection };

            // 计算新蛇头位置
            const head = { ...snake[0] };
            head.x += direction.x;
            head.y += direction.y;

            // 检测碰撞
            if (checkCollision(head)) {
                gameOver();
                return;
            }

            // 添加新蛇头
            snake.unshift(head);

            // 检测是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScoreDisplay();
                spawnFood();
            } else {
                // 移除蛇尾
                snake.pop();
            }
        }

        /**
         * 检测碰撞
         * @param {Object} head - 蛇头坐标
         * @returns {boolean} 是否发生碰撞
         */
        function checkCollision(head) {
            // 撞墙检测
            if (head.x < 0 || head.x >= CONFIG.gridWidth ||
                head.y < 0 || head.y >= CONFIG.gridHeight) {
                return true;
            }

            // 撞自己检测
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }

            return false;
        }

        /**
         * 生成食物
         */
        function spawnFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * CONFIG.gridWidth),
                    y: Math.floor(Math.random() * CONFIG.gridHeight)
                };
            } while (isOnSnake(newFood));
            food = newFood;
        }

        /**
         * 检查位置是否在蛇身上
         * @param {Object} pos - 位置坐标
         * @returns {boolean} 是否在蛇身上
         */
        function isOnSnake(pos) {
            return snake.some(segment => segment.x === pos.x && segment.y === pos.y);
        }

        // ==================== 渲染 ====================
        /**
         * 绘制游戏画面
         */
        function draw() {
            // 清空画布
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg-secondary');
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            drawGrid();

            // 绘制食物
            drawFood();

            // 绘制蛇
            drawSnake();
        }

        /**
         * 绘制网格背景
         */
        function drawGrid() {
            ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--bg-grid');
            ctx.lineWidth = 0.5;

            for (let x = 0; x <= CONFIG.gridWidth * CONFIG.gridSize; x += CONFIG.gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CONFIG.gridHeight * CONFIG.gridSize);
                ctx.stroke();
            }

            for (let y = 0; y <= CONFIG.gridHeight * CONFIG.gridSize; y += CONFIG.gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(CONFIG.gridWidth * CONFIG.gridSize, y);
                ctx.stroke();
            }
        }

        /**
         * 绘制蛇
         */
        function drawSnake() {
            snake.forEach((segment, index) => {
                const x = segment.x * CONFIG.gridSize;
                const y = segment.y * CONFIG.gridSize;
                const size = CONFIG.gridSize - 2;

                // 渐变色蛇身
                const gradient = ctx.createLinearGradient(x, y, x + size, y + size);
                if (index === 0) {
                    // 蛇头 - 更亮
                    gradient.addColorStop(0, '#00ffaa');
                    gradient.addColorStop(1, '#00cc88');
                } else {
                    // 蛇身 - 渐变色
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(0, 255, 136, ${alpha})`);
                    gradient.addColorStop(1, `rgba(0, 180, 100, ${alpha})`);
                }

                // 绘制圆角矩形
                roundRect(ctx, x + 1, y + 1, size, size, 4);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 蛇头绘制眼睛
                if (index === 0) {
                    drawSnakeEyes(x, y, size);
                }
            });
        }

        /**
         * 绘制蛇的眼睛
         * @param {number} x - X 坐标
         * @param {number} y - Y 坐标
         * @param {number} size - 大小
         */
        function drawSnakeEyes(x, y, size) {
            ctx.fillStyle = '#ffffff';

            const eyeSize = 3;
            const eyeOffset = size / 4;

            // 根据方向确定眼睛位置
            let eye1X, eye1Y, eye2X, eye2Y;

            if (direction.x === 1) {  // 向右
                eye1X = x + size - 4; eye1Y = y + eyeOffset;
                eye2X = x + size - 4; eye2Y = y + size - eyeOffset - eyeSize;
            } else if (direction.x === -1) {  // 向左
                eye1X = x + 2; eye1Y = y + eyeOffset;
                eye2X = x + 2; eye2Y = y + size - eyeOffset - eyeSize;
            } else if (direction.y === -1) {  // 向上
                eye1X = x + eyeOffset; eye1Y = y + 2;
                eye2X = x + size - eyeOffset - eyeSize; eye2Y = y + 2;
            } else {  // 向下
                eye1X = x + eyeOffset; eye1Y = y + size - 4;
                eye2X = x + size - eyeOffset - eyeSize; eye2Y = y + size - 4;
            }

            // 绘制两只眼睛
            ctx.beginPath();
            ctx.arc(eye1X + eyeSize/2, eye1Y + eyeSize/2, eyeSize, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(eye2X + eyeSize/2, eye2Y + eyeSize/2, eyeSize, 0, Math.PI * 2);
            ctx.fill();
        }

        /**
         * 绘制食物（带发光效果）
         */
        function drawFood() {
            const x = food.x * CONFIG.gridSize + CONFIG.gridSize / 2;
            const y = food.y * CONFIG.gridSize + CONFIG.gridSize / 2;
            const radius = CONFIG.gridSize / 2 - 2;

            // 外发光
            const glowGradient = ctx.createRadialGradient(x, y, 0, x, y, radius * 2);
            glowGradient.addColorStop(0, 'rgba(255, 107, 107, 0.5)');
            glowGradient.addColorStop(1, 'rgba(255, 107, 107, 0)');

            ctx.fillStyle = glowGradient;
            ctx.beginPath();
            ctx.arc(x, y, radius * 2, 0, Math.PI * 2);
            ctx.fill();

            // 食物本体
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();

            // 高光
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.arc(x - radius/3, y - radius/3, radius/3, 0, Math.PI * 2);
            ctx.fill();
        }

        /**
         * 绘制圆角矩形
         */
        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        // ==================== 游戏控制 ====================
        /**
         * 开始/暂停游戏
         */
        function startPauseGame() {
            if (gameRunning) {
                // 暂停
                gamePaused = !gamePaused;
                pauseOverlay.classList.toggle('show', gamePaused);
                startPauseBtn.innerHTML = gamePaused ?
                    `<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg> 继续` :
                    `<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg> 暂停`;
            } else {
                // 开始新游戏
                startGame();
            }
        }

        /**
         * 开始新游戏
         */
        function startGame() {
            gameRunning = true;
            gamePaused = false;
            score = 0;
            updateScoreDisplay();
            initSnake();
            spawnFood();
            gameOverOverlay.classList.remove('show');
            pauseOverlay.classList.remove('show');
            startPauseBtn.innerHTML = `<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg> 暂停`;
            gameLoop();
        }

        /**
         * 游戏结束
         */
        function gameOver() {
            gameRunning = false;
            clearTimeout(gameLoopId);

            // 更新最高分
            if (score > highScore) {
                highScore = score;
                saveHighScore();
                updateScoreDisplay();
            }

            finalScoreEl.textContent = score;
            gameOverOverlay.classList.add('show');
            startPauseBtn.innerHTML = `<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg> 开始游戏`;
        }

        /**
         * 重置游戏
         */
        function resetGame() {
            gameRunning = false;
            gamePaused = false;
            clearTimeout(gameLoopId);
            initSnake();
            spawnFood();
            score = 0;
            updateScoreDisplay();
            draw();
            gameOverOverlay.classList.remove('show');
            pauseOverlay.classList.remove('show');
            startPauseBtn.innerHTML = `<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg> 开始游戏`;
        }

        /**
         * 改变方向
         * @param {string} newDir - 新方向
         */
        function changeDirection(newDir) {
            const directions = {
                up: { x: 0, y: -1 },
                down: { x: 0, y: 1 },
                left: { x: -1, y: 0 },
                right: { x: 1, y: 0 }
            };

            const newDirection = directions[newDir];
            if (!newDirection) return;

            // 防止掉头
            if (newDirection.x !== -direction.x && newDirection.y !== -direction.y) {
                nextDirection = newDirection;
            }
        }

        // ==================== 分数和存储 ====================
        /**
         * 更新分数显示
         */
        function updateScoreDisplay() {
            currentScoreEl.textContent = score;
            highScoreEl.textContent = highScore;
        }

        /**
         * 保存最高分到 localStorage
         */
        function saveHighScore() {
            localStorage.setItem('snakeHighScore', highScore.toString());
        }

        /**
         * 从 localStorage 加载最高分
         */
        function loadHighScore() {
            const saved = localStorage.getItem('snakeHighScore');
            highScore = saved ? parseInt(saved) : 0;
        }

        // ==================== 事件绑定 ====================
        /**
         * 绑定所有事件
         */
        function bindEvents() {
            // 键盘控制
            document.addEventListener('keydown', handleKeydown);

            // 按钮事件
            startPauseBtn.addEventListener('click', startPauseGame);
            restartBtn.addEventListener('click', () => {
                restartBtn.blur();
                startGame();
            });
            resetBtn.addEventListener('click', resetGame);

            // 难度选择
            difficultyBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    difficultyBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    gameSpeed = CONFIG.speeds[this.dataset.speed];
                    this.blur();
                });
            });

            // 主题切换
            themeToggle.addEventListener('click', toggleTheme);

            // 移动端控制
            mobileBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    changeDirection(this.dataset.direction);
                    this.blur();
                });
            });

            // 游戏结束点击重开
            restartBtn.addEventListener('click', () => {
                gameOverOverlay.classList.remove('show');
                startGame();
            });
        }

        /**
         * 处理键盘事件
         * @param {KeyboardEvent} e - 键盘事件
         */
        function handleKeydown(e) {
            const keyMap = {
                'ArrowUp': 'up', 'KeyW': 'up',
                'ArrowDown': 'down', 'KeyS': 'down',
                'ArrowLeft': 'left', 'KeyA': 'left',
                'ArrowRight': 'right', 'KeyD': 'right',
                ' ': 'space'
            };

            const action = keyMap[e.code];

            if (action === 'space') {
                e.preventDefault();
                startPauseGame();
                return;
            }

            if (action) {
                e.preventDefault();
                changeDirection(action);
            }
        }

        /**
         * 切换主题
         */
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('snakeTheme', newTheme);
            draw();  // 重新绘制以适应新主题
        }

        /**
         * 加载保存的主题
         */
        function loadTheme() {
            const savedTheme = localStorage.getItem('snakeTheme') || 'dark';
            document.body.setAttribute('data-theme', savedTheme);
        }

        // ==================== 启动游戏 ====================
        init();
    </script>
</body>
</html>
